version: 2
updates:
  # npm 의존성 (매일 체크)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"

  # GitHub Actions 워크플로우 (매주 체크)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
